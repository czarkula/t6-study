<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>T-6A Practice</title>
    <link href="static/css/bootstrap.min.css" rel="stylesheet">
    <link href="static/css/site.css" rel="stylesheet">
  </head>
  <body class="landing-page">
    <nav class="navbar navbar-expand-md navbar-dark fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">T-6A Practice</a>
        <div class="navbar-nav">
          <a class="nav-link" href="boldface.html">Boldface</a>
          <a class="nav-link" href="ops.html">Ops Limits</a>
          <a class="nav-link" href="leaderboard.html">Leaderboard</a>
        </div>
      </div>
    </nav>

    <main class="home-shell container">
      <section class="home-copy">
        <div class="hero-kicker">Boldface Practice Trainer</div>
        <h1 class="home-title">Hello! Practice boldface and ops limits here.</h1>
        <p class="hero-copy">Type it exactly, race the clock.</p>

        <div class="launch-panel mt-4">
          <label for="pilotName" class="form-label">Name <span class="optional-label">(optional)</span></label>
          <input id="pilotName" class="form-control form-control-lg name-input" type="text" autocomplete="name" maxlength="32">
          <div class="launch-actions">
            <a class="launch-card" href="boldface.html" data-base-href="boldface.html" data-practice-link>
              <strong>Boldface</strong>
            </a>
            <a class="launch-card" href="ops.html" data-base-href="ops.html" data-practice-link>
              <strong>Ops Limits</strong>
            </a>
            <a class="launch-card" href="boldface.html?combo=1" data-base-href="boldface.html?combo=1" data-practice-link>
              <strong>Both</strong>
            </a>
          </div>
        </div>
      </section>

      <section class="hero-media" aria-label="T-6 aircraft and friendly shark mascot">
        <img class="t6-image" src="static/img/t6.jpg" alt="T-6 aircraft on short final">
        <img class="shark-image" src="static/img/shark.jpg" alt="Cute cartoon shark">
      </section>
    </main>

    <script src="static/js/bootstrap.min.js"></script>
    <script src="static/js/config.js"></script>
    <script src="static/js/practice.js"></script>
    <script>T6Practice.initLanding();</script>
  </body>
</html>
